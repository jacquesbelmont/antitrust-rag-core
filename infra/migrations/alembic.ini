# Alembic configuration — Legal RAG system
# Run migrations with:
#   ALEMBIC_DATABASE_URL=postgresql+psycopg2://... alembic -c infra/migrations/alembic.ini upgrade head

[alembic]
# Path to migration scripts — relative to this file's location.
script_location = %(here)s

# SQLAlchemy URL is injected at runtime from ALEMBIC_DATABASE_URL env var.
# Never set sqlalchemy.url here — it would hardcode credentials.
# sqlalchemy.url is set programmatically in env.py.

# Autogenerate comparison flags
compare_type = true
compare_server_default = true

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
